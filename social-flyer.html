<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ellie May Photography — Social Media Flyer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e8e0d8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      padding: 40px;
    }

    /* ─── FLYER CANVAS (1080 × 1080) ───────────────────── */
    .flyer {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: #faf6f1;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }

    /* Subtle warm radial glow */
    .flyer::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(193,168,140,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(193,168,140,0.10) 0%, transparent 50%);
      z-index: 1;
      pointer-events: none;
    }

    /* ─── DECORATIVE BORDER ─────────────────────────────── */
    .flyer-border {
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(139,109,79,0.22);
      z-index: 20;
      pointer-events: none;
    }
    .flyer-border::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(139,109,79,0.10);
    }

    /* Corner accents */
    .corner { position: absolute; width: 36px; height: 36px; z-index: 21; pointer-events: none; }
    .corner::before, .corner::after { content: ''; position: absolute; background: #8b6d4f; }
    .corner-tl { top: 14px; left: 14px; }
    .corner-tl::before { top: 0; left: 0; width: 18px; height: 1px; }
    .corner-tl::after  { top: 0; left: 0; width: 1px; height: 18px; }
    .corner-tr { top: 14px; right: 14px; }
    .corner-tr::before { top: 0; right: 0; width: 18px; height: 1px; }
    .corner-tr::after  { top: 0; right: 0; width: 1px; height: 18px; }
    .corner-bl { bottom: 14px; left: 14px; }
    .corner-bl::before { bottom: 0; left: 0; width: 18px; height: 1px; }
    .corner-bl::after  { bottom: 0; left: 0; width: 1px; height: 18px; }
    .corner-br { bottom: 14px; right: 14px; }
    .corner-br::before { bottom: 0; right: 0; width: 18px; height: 1px; }
    .corner-br::after  { bottom: 0; right: 0; width: 1px; height: 18px; }

    /* ─── TOP SECTION ──────────────────────────────────── */
    .flyer-top {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 44px 60px 0;
      flex-shrink: 0;
    }

    .logo-img {
      width: 80px;
      height: auto;
      margin-bottom: 4px;
      opacity: 0.85;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #5a4635;
      margin-bottom: 14px;
    }

    .flyer-headline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 48px;
      line-height: 1.08;
      color: #2c2218;
    }
    .flyer-headline em {
      font-style: italic;
      font-weight: 400;
      color: #8b6d4f;
    }

    .flyer-tagline {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #8b6d4f;
      margin-top: 10px;
    }

    /* ─── PHOTO COLLAGE ────────────────────────────────── */
    .photo-collage {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      gap: 8px;
      padding: 24px 44px 0;
      flex: 1;
      min-height: 0;
    }

    .photo-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .photo-frame {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-radius: 3px;
      min-height: 0;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px;
      pointer-events: none;
    }

    .photo-col:nth-child(1) .photo-frame:first-child { flex: 1.4; }
    .photo-col:nth-child(1) .photo-frame:last-child  { flex: 0.6; }
    .photo-col:nth-child(2) .photo-frame { flex: 1; }
    .photo-col:nth-child(3) .photo-frame:first-child { flex: 0.6; }
    .photo-col:nth-child(3) .photo-frame:last-child  { flex: 1.4; }

    /* ─── BOTTOM PANEL ─────────────────────────────────── */
    .flyer-bottom-panel {
      position: relative;
      z-index: 5;
      flex-shrink: 0;
      text-align: center;
      padding: 18px 60px 40px;
    }

    /* Divider */
    .divider-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c1a88c, transparent);
      max-width: 380px;
    }
    .divider-diamond {
      width: 6px;
      height: 6px;
      background: #c1a88c;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* Services */
    .services-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 14px;
    }
    .service-item {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #5a4635;
    }
    .service-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #c1a88c;
      flex-shrink: 0;
    }

    /* Contact row */
    .cta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      margin-bottom: 8px;
    }
    .cta-item {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .cta-icon {
      font-size: 13px;
      color: #8b6d4f;
    }
    .cta-text {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 11.5px;
      color: #5a4635;
      letter-spacing: 0.3px;
    }

    /* Website */
    .website-url {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 19px;
      letter-spacing: 2px;
      color: #8b6d4f;
      margin-bottom: 10px;
    }

    /* Booking badge */
    .booking-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 28px;
      background: #2c2218;
      color: #faf6f1;
      border-radius: 2px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .booking-badge .sparkle { color: #c1a88c; }

    /* Stars */
    .stars-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .stars {
      display: flex;
      gap: 3px;
    }
    .star {
      color: #c1a88c;
      font-size: 11px;
    }
    .star-label {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 9.5px;
      color: #8b6d4f;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ─── PRINT ─────────────────────────────────────────── */
    @media print {
      body { padding: 0; background: white; }
      .flyer { box-shadow: none; }
    }
  </style>
</head>
<body>

<div class="flyer">
  <!-- Decorative border -->
  <div class="flyer-border"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- ─── TOP: LOGO + HEADLINE ─── -->
  <div class="flyer-top">
    <img src="Images/Ellie-May-Photos-Logo-Circle.png" alt="Ellie May Photography" class="logo-img" />
    <div class="brand-name">Ellie May Photography</div>
    <h1 class="flyer-headline">Your Story,<br /><em>Forever Told</em></h1>
    <p class="flyer-tagline">Natural & Emotive Wedding Photography</p>
  </div>

  <!-- ─── PHOTO COLLAGE ─── -->
  <div class="photo-collage">
    <div class="photo-col">
      <div class="photo-frame">
        <img src="Images/4.png" alt="Bride and groom sharing a kiss in front of a castle in autumn" />
      </div>
      <div class="photo-frame">
        <img src="Images/3.png" alt="Beautifully decorated wedding cake with fresh flowers" />
      </div>
    </div>
    <div class="photo-col">
      <div class="photo-frame">
        <img src="Images/Screenshot 2026-06-08 at 13.05.10.png" alt="Couple sharing a tender moment in a garden" />
      </div>
      <div class="photo-frame">
        <img src="Images/Screenshot 2026-06-08 at 13.05.59.png" alt="Couple in golden meadow at sunset" />
      </div>
    </div>
    <div class="photo-col">
      <div class="photo-frame">
        <img src="Images/Anna and David-1241.jpg" alt="Close-up of wedding rings" />
      </div>
      <div class="photo-frame">
        <img src="Images/1.png" alt="Bride and groom sitting on rustic stone steps" />
      </div>
    </div>
  </div>

  <!-- ─── BOTTOM PANEL ─── -->
  <div class="flyer-bottom-panel">
    <div class="divider-row">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="services-strip">
      <span class="service-item">Weddings</span>
      <span class="service-dot"></span>
      <span class="service-item">Engagements</span>
      <span class="service-dot"></span>
      <span class="service-item">Families</span>
      <span class="service-dot"></span>
      <span class="service-item">Portraits</span>
    </div>

    <div class="cta-row">
      <div class="cta-item">
        <span class="cta-icon">✉</span>
        <span class="cta-text">hello@elliemayphotos.com</span>
      </div>
      <div class="cta-item">
        <span class="cta-icon">◎</span>
        <span class="cta-text">Worcestershire & UK-wide</span>
      </div>
    </div>

    <div class="website-url">www.elliemayphotos.com</div>

    <div class="booking-badge">
      <span class="sparkle">✦</span>
      Now Booking 2026 & Beyond
      <span class="sparkle">✦</span>
    </div>


  </div>
</div>

</body>
</html>
